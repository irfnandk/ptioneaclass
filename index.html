<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTI One Class | Portofolio Kelas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#0F4C81;
  --secondary:#2563EB;
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --text:#0F172A;
  --muted:#64748B;
  --border:#E5E7EB;
  --radius:16px;
  --shadow:0 10px 30px rgba(15,23,42,.08);
}
body.dark{
  --bg:#0B1220;
  --card:#111827;
  --text:#F9FAFB;
  --muted:#9CA3AF;
  --border:#1F2937;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:var(--bg);color:var(--text);line-height:1.6}
a{text-decoration:none;color:inherit}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);z-index:100}
body.dark header{background:#111}
.nav{max-width:1200px;margin:auto;padding:18px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:Poppins;font-weight:700;color:var(--primary)}
.nav-menu{display:flex;gap:20px;align-items:center}
.nav-menu a{font-size:14px;color:var(--muted);cursor:pointer}
.toggle{padding:6px 12px;border:1px solid var(--border);border-radius:999px;cursor:pointer}

section{max-width:1200px;margin:80px auto;padding:0 20px}
.section-title{margin-bottom:40px}
.section-title h2{font-family:Poppins;font-size:28px}

.hero{margin-top:100px}
.btn{padding:10px 20px;border-radius:999px;font-size:14px;cursor:pointer}
.btn-primary{background:var(--primary);color:white;border:none}
.news-card{background:var(--card);padding:20px;border-radius:16px;margin-bottom:20px;border:1px solid var(--border)}
.members{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.member{background:var(--card);padding:20px;border-radius:16px;text-align:center;border:1px solid var(--border)}
.badge{padding:4px 8px;border-radius:999px;font-size:11px;color:#fff}
.ketua{background:#2563EB}
.sekretaris{background:#059669}
.bendahara{background:#D97706}
.anggota{background:#64748B}
footer{text-align:center;padding:40px;border-top:1px solid var(--border);margin-top:100px}

#dashboard{display:none}
input,select{width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid var(--border)}
button{cursor:pointer}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo">PTI One Class</div>
<div class="nav-menu" id="navMenu">
<a href="#anggota">Anggota</a>
<a onclick="openLogin()">Login</a>
<div class="toggle" onclick="toggleDark()">Dark</div>
</div>
</div>
</header>

<section class="hero">
<h1>Website Resmi PTI One Class</h1>
<p>Portofolio kelas dengan sistem dashboard keuangan modern.</p>
</section>

<section id="anggota">
<div class="section-title">
<h2>Struktur Kelas</h2>
<p id="jumlahAnggota"></p>
</div>
<div class="members" id="members"></div>
</section>

<section id="dashboard">
<div class="section-title">
<h2>Dashboard Keuangan</h2>
<button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:8px">Logout</button>
</div>

<div class="news-card">
<h4>Total Saldo</h4>
<h2 id="totalKas">Rp 0</h2>
</div>

<div class="news-card">
<h4>Tambah Transaksi</h4>
<input id="namaTransaksi" placeholder="Nama">
<select id="jenisTransaksi">
<option value="masuk">Kas Masuk</option>
<option value="keluar">Kas Keluar</option>
</select>
<input id="jumlahTransaksi" type="number" placeholder="Jumlah">
<button onclick="tambahKas()" class="btn btn-primary">Simpan</button>
</div>

<div class="news-card">
<h4>Riwayat</h4>
<div id="riwayatKas"></div>
</div>

<div class="news-card">
<h4>Grafik Kas</h4>
<canvas id="grafikKas"></canvas>
</div>

<div class="news-card">
<h4>Status Iuran</h4>
<div id="listIuran"></div>
<button onclick="exportCSV()" class="btn btn-primary">Export CSV</button>
</div>

<div class="news-card">
<h4>Statistik</h4>
<canvas id="pieChart"></canvas>
</div>
</section>

<footer>© 2026 PTI One Class</footer>

<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center">
<div style="background:white;padding:30px;border-radius:16px;width:90%;max-width:400px">
<h3>Login</h3>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()" class="btn btn-primary" style="width:100%">Login</button>
</div>
</div>

<script>
/* DARK MODE */
function toggleDark(){
document.body.classList.toggle('dark');
localStorage.setItem('dark',document.body.classList.contains('dark'));
}
if(localStorage.getItem('dark')==="true") document.body.classList.add('dark');

/* DATA ANGGOTA */
let anggota=[
{nama:"IMAM",jabatan:"Ketua Kelas"},
{nama:"BILLY",jabatan:"Wakil Ketua"},
{nama:"JULIA",jabatan:"Sekretaris"},
{nama:"REGITA",jabatan:"Bendahara"},
{nama:"ANGGOTA 1",jabatan:"Anggota"},
{nama:"ANGGOTA 2",jabatan:"Anggota"}
];

function badgeClass(j){
if(j.includes("Ketua")) return "ketua";
if(j==="Sekretaris") return "sekretaris";
if(j==="Bendahara") return "bendahara";
return "anggota";
}

function renderAnggota(){
let box=document.getElementById("members");
box.innerHTML="";
anggota.forEach(a=>{
box.innerHTML+=`
<div class="member">
<h4>${a.nama}</h4>
<span class="badge ${badgeClass(a.jabatan)}">${a.jabatan}</span>
</div>`;
});
document.getElementById("jumlahAnggota").innerText="Total: "+anggota.length;
}
renderAnggota();

/* LOGIN SYSTEM */
let users=[
{username:"admin",password:"ptiadmin",role:"admin"},
{username:"viewer",password:"ptiuser",role:"viewer"}
];
let currentUser=JSON.parse(localStorage.getItem("ptiUser"))||null;

function openLogin(){document.getElementById("loginModal").style.display="flex";}
function login(){
let u=loginUser.value;
let p=loginPass.value;
let found=users.find(x=>x.username===u && x.password===p);
if(found){
currentUser=found;
localStorage.setItem("ptiUser",JSON.stringify(found));
document.getElementById("loginModal").style.display="none";
checkAccess();
}
}
function logout(){
localStorage.removeItem("ptiUser");
location.reload();
}
function checkAccess(){
document.getElementById("dashboard").style.display=currentUser?"block":"none";
}
checkAccess();

/* KAS SYSTEM */
let kas=JSON.parse(localStorage.getItem("kasPTI"))||[];
function tambahKas(){
kas.push({
nama:namaTransaksi.value,
jenis:jenisTransaksi.value,
jumlah:parseInt(jumlahTransaksi.value),
tanggal:new Date()
});
localStorage.setItem("kasPTI",JSON.stringify(kas));
renderKas();
}
function renderKas(){
let total=0;
let box=document.getElementById("riwayatKas");
box.innerHTML="";
kas.forEach((k,i)=>{
if(k.jenis==="masuk") total+=k.jumlah;
else total-=k.jumlah;
box.innerHTML+=`${k.nama} - ${k.jenis} - Rp ${k.jumlah}<br>`;
});
document.getElementById("totalKas").innerText="Rp "+total;
renderChart();
}
function renderChart(){
let bulan={};
kas.forEach(k=>{
let b=new Date(k.tanggal).getMonth();
bulan[b]=(bulan[b]||0)+(k.jenis==="masuk"?k.jumlah:-k.jumlah);
});
let ctx=document.getElementById("grafikKas");
if(window.barChart) window.barChart.destroy();
window.barChart=new Chart(ctx,{
type:"bar",
data:{labels:Object.keys(bulan),datasets:[{label:"Kas",data:Object.values(bulan)}]}
});
}
renderKas();

/* IURAN */
let iuran=JSON.parse(localStorage.getItem("iuran"))||{};
let target=50000;
function renderIuran(){
let box=document.getElementById("listIuran");
box.innerHTML="";
anggota.forEach(a=>{
if(!iuran[a.nama]) iuran[a.nama]=0;
let status=iuran[a.nama]>=target?"LUNAS":"BELUM";
box.innerHTML+=`${a.nama} - ${status} (Rp ${iuran[a.nama]})<br>`;
});
localStorage.setItem("iuran",JSON.stringify(iuran));
renderPie();
}
renderIuran();

function renderPie(){
let lunas=0,belum=0;
anggota.forEach(a=>{
if(iuran[a.nama]>=target) lunas++; else belum++;
});
let ctx=document.getElementById("pieChart");
if(window.pieChart) window.pieChart.destroy();
window.pieChart=new Chart(ctx,{
type:"pie",
data:{labels:["Lunas","Belum"],datasets:[{data:[lunas,belum]}]}
});
}

/* EXPORT CSV */
function exportCSV(){
let data="Nama,Bayar\n";
anggota.forEach(a=>{
data+=`${a.nama},${iuran[a.nama]||0}\n`;
});
let blob=new Blob([data],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="iuran_pti.csv";
link.click();
}
</script>

</body>
</html>
